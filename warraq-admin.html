<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورق — لوحة الإدارة</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a0a; color: #e5e5e5; }
  .card { background: #111; border: 1px solid #222; border-radius: 12px; }
  .stat-card { background: linear-gradient(135deg, #1a1a1a, #111); border: 1px solid #2a2a2a; }
  .btn-gold { background: #c9a84c; color: #000; font-weight: 700; border-radius: 8px; padding: 10px 20px; cursor: pointer; border: none; font-size: 16px; width: 100%; }
  .btn-gold:active { background: #e0ba60; }
  .btn-red { background: #7f1d1d; color: #fca5a5; border-radius: 8px; padding: 6px 14px; cursor: pointer; border: none; font-size: 14px; }
  .btn-green { background: #14532d; color: #86efac; border-radius: 8px; padding: 6px 14px; cursor: pointer; border: none; font-size: 14px; }
  .btn-sm { background: #1e3a5f; color: #93c5fd; border-radius: 6px; padding: 4px 10px; cursor: pointer; border: none; font-size: 12px; }
  .inp { background: #1a1a1a; border: 1px solid #333; color: #e5e5e5; border-radius: 8px; padding: 10px 14px; width: 100%; font-size: 15px; box-sizing: border-box; }
  .inp:focus { outline: none; border-color: #c9a84c; }
  .tab { padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent; color: #888; }
  .tab.on { border-bottom-color: #c9a84c; color: #c9a84c; }
  .badge-t { background: #1e3a5f; color: #93c5fd; border-radius: 999px; padding: 2px 8px; font-size: 11px; }
  .badge-e { background: #3b0000; color: #fca5a5; border-radius: 999px; padding: 2px 8px; font-size: 11px; }
  .badge-p { background: #14532d; color: #86efac; border-radius: 999px; padding: 2px 8px; font-size: 11px; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #222; border: 1px solid #444; padding: 12px 24px; border-radius: 10px; z-index: 9999; display: none; white-space: nowrap; }
</style>
</head>
<body>

<div id="loginScreen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div class="card" style="padding:40px;width:100%;max-width:380px;text-align:center;">
    <div style="font-size:48px;font-family:serif;color:#c9a84c;font-weight:900;margin-bottom:4px;">ورق</div>
    <div style="color:#666;font-size:14px;margin-bottom:32px;">لوحة الإدارة السرية</div>
    <input id="inUrl" class="inp" placeholder="Supabase URL" type="text" style="margin-bottom:12px;" />
    <input id="inKey" class="inp" placeholder="Secret Key" type="password" style="margin-bottom:12px;" />
    <input id="inPass" class="inp" placeholder="كلمة سر الداشبورد" type="password" style="margin-bottom:24px;" />
    <button id="btnLogin" class="btn-gold">دخول</button>
    <div id="loginErr" style="color:#f87171;font-size:14px;margin-top:16px;min-height:20px;"></div>
  </div>
</div>

<div id="dash" style="display:none;">
  <div style="background:#0a0a0a;border-bottom:1px solid #222;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;">
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="font-size:22px;font-family:serif;color:#c9a84c;font-weight:900;">ورق</span>
      <span style="color:#555;font-size:13px;">لوحة الإدارة</span>
    </div>
    <div style="display:flex;gap:12px;align-items:center;">
      <span id="lastUp" style="color:#444;font-size:12px;"></span>
      <button id="btnRefresh" class="btn-sm" style="background:#c9a84c;color:#000;padding:6px 14px;">تحديث</button>
      <button id="btnLogout" style="background:none;border:none;color:#666;cursor:pointer;font-size:13px;">خروج</button>
    </div>
  </div>

  <div style="display:flex;border-bottom:1px solid #222;padding:0 20px;overflow-x:auto;">
    <div class="tab on" id="t-overview" data-tab="overview">نظرة عامة</div>
    <div class="tab" id="t-users" data-tab="users">المستخدمون</div>
    <div class="tab" id="t-items" data-tab="items">العناصر</div>
    <div class="tab" id="t-notif" data-tab="notif">الإشعارات</div>
    <div class="tab" id="t-actions" data-tab="actions">الإجراءات</div>
  </div>

  <div style="padding:20px;max-width:1200px;margin:0 auto;">

    <div id="tab-overview">
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px;" id="statsGrid"></div>
      <div class="card" style="padding:16px;">
        <div style="color:#888;font-size:13px;margin-bottom:12px;">أحدث التسجيلات</div>
        <div id="recentList"></div>
      </div>
    </div>

    <div id="tab-users" style="display:none;">
      <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
        <input id="srchUser" class="inp" placeholder="بحث بالإيميل..." style="flex:1;min-width:200px;" />
        <select id="fltStatus" class="inp" style="width:140px;">
          <option value="all">الكل</option>
          <option value="trial">في التجربة</option>
          <option value="expired">منتهية</option>
          <option value="paid">مدفوع</option>
        </select>
        <button id="btnExport" class="btn-sm" style="background:#c9a84c;color:#000;padding:8px 16px;">تصدير CSV</button>
      </div>
      <div class="card" style="overflow:auto;">
        <table style="width:100%;font-size:13px;border-collapse:collapse;">
          <thead>
            <tr style="border-bottom:1px solid #222;color:#666;">
              <th style="padding:10px;text-align:right;">الإيميل</th>
              <th style="padding:10px;text-align:right;">الحالة</th>
              <th style="padding:10px;text-align:right;">تسجيل</th>
              <th style="padding:10px;text-align:right;">انتهاء التجربة</th>
              <th style="padding:10px;text-align:right;">إجراء</th>
            </tr>
          </thead>
          <tbody id="usersBody"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-items" style="display:none;">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;" id="itemStats"></div>
      <div class="card" style="padding:16px;">
        <div style="color:#888;font-size:13px;margin-bottom:12px;">آخر 20 عنصر</div>
        <div id="itemsList"></div>
      </div>
    </div>

    <div id="tab-notif" style="display:none;">
      <div class="card" style="padding:20px;">
        <div style="color:#888;font-size:13px;margin-bottom:16px;">إرسال إشعار</div>
        <select id="notifTarget" class="inp" style="margin-bottom:12px;">
          <option value="all">كل المستخدمين</option>
          <option value="trial">في التجربة</option>
          <option value="single">مستخدم واحد</option>
        </select>
        <input id="notifEmail" class="inp" placeholder="إيميل المستخدم" style="display:none;margin-bottom:12px;" />
        <input id="notifTitle" class="inp" placeholder="عنوان الإشعار" style="margin-bottom:12px;" />
        <textarea id="notifBody" class="inp" rows="3" placeholder="نص الإشعار" style="margin-bottom:16px;resize:vertical;"></textarea>
        <button id="btnSendNotif" class="btn-gold" style="width:auto;padding:10px 30px;">إرسال</button>
      </div>
    </div>

    <div id="tab-actions" style="display:none;">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;">
        <div class="card" style="padding:20px;">
          <div style="color:#c9a84c;font-weight:600;margin-bottom:14px;">⏳ تمديد التجربة</div>
          <input id="extEmail" class="inp" placeholder="إيميل المستخدم" style="margin-bottom:10px;" />
          <select id="extDays" class="inp" style="margin-bottom:14px;">
            <option value="3">3 أيام</option>
            <option value="7">7 أيام</option>
            <option value="14">14 يوم</option>
            <option value="21">21 يوم</option>
            <option value="30">30 يوم</option>
          </select>
          <button id="btnExtend" class="btn-gold">تمديد</button>
        </div>
        <div class="card" style="padding:20px;">
          <div style="color:#93c5fd;font-weight:600;margin-bottom:14px;">🔍 بحث عن مستخدم</div>
          <input id="lookEmail" class="inp" placeholder="إيميل المستخدم" style="margin-bottom:10px;" />
          <button id="btnLookup" class="btn-gold" style="margin-bottom:12px;">بحث</button>
          <div id="lookResult" style="font-size:12px;color:#aaa;background:#0d0d0d;border-radius:8px;padding:12px;display:none;line-height:1.8;"></div>
        </div>
        <div class="card" style="padding:20px;">
          <div style="color:#fca5a5;font-weight:600;margin-bottom:14px;">🚫 تعطيل مستخدم</div>
          <input id="banEmail" class="inp" placeholder="إيميل المستخدم" style="margin-bottom:10px;" />
          <input id="banReason" class="inp" placeholder="السبب" style="margin-bottom:14px;" />
          <button id="btnBan" class="btn-red" style="width:100%;padding:10px;">تعطيل الحساب</button>
        </div>
        <div class="card" style="padding:20px;">
          <div style="color:#86efac;font-weight:600;margin-bottom:14px;">✅ تفعيل مستخدم</div>
          <input id="unbanEmail" class="inp" placeholder="إيميل المستخدم" style="margin-bottom:14px;" />
          <button id="btnUnban" class="btn-green" style="width:100%;padding:10px;">رفع الحظر</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
const PWD = 'warraq-admin-2026';
let SB_URL = '', SB_KEY = '';
let allUsers = [];

// ─── Supabase REST helper ───────────────────────────────────────────
async function sb(table, params = '') {
  const r = await fetch(SB_URL + '/rest/v1/' + table + params, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Accept': 'application/json' }
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbCount(table, params = '') {
  const r = await fetch(SB_URL + '/rest/v1/' + table + params, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Prefer': 'count=exact', 'Accept': 'application/json' }
  });
  const count = r.headers.get('content-range');
  return count ? parseInt(count.split('/')[1]) : 0;
}

async function sbPost(table, body) {
  const r = await fetch(SB_URL + '/rest/v1/' + table, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
}

async function sbPatch(table, match, body) {
  const r = await fetch(SB_URL + '/rest/v1/' + table + '?' + match, {
    method: 'PATCH',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
}

// ─── Login ─────────────────────────────────────────────────────────
document.getElementById('btnLogin').addEventListener('click', function() {
  const url = document.getElementById('inUrl').value.trim();
  const key = document.getElementById('inKey').value.trim();
  const pass = document.getElementById('inPass').value;
  const err = document.getElementById('loginErr');

  if (pass !== PWD) { err.textContent = 'كلمة السر غلط'; return; }
  if (!url || !key) { err.textContent = 'أدخل URL و Key'; return; }

  SB_URL = url.replace(/\/$/, '');
  SB_KEY = key;
  err.textContent = 'جاري الاتصال...';

  sb('profiles', '?select=id&limit=1').then(() => {
    try { sessionStorage.setItem('su', SB_URL); sessionStorage.setItem('sk', SB_KEY); } catch {}
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    loadAll();
  }).catch(e => {
    err.textContent = 'فشل الاتصال: ' + (e.message || 'تحقق من URL و Key');
  });
});

document.getElementById('btnLogout').addEventListener('click', function() {
  try { sessionStorage.clear(); } catch {}
  location.reload();
});

document.getElementById('btnRefresh').addEventListener('click', loadAll);

// ─── Tabs ────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(function(t) {
  t.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('on'); });
    document.querySelectorAll('[id^="tab-"]').forEach(function(x) { x.style.display = 'none'; });
    t.classList.add('on');
    var name = t.getAttribute('data-tab');
    document.getElementById('tab-' + name).style.display = 'block';
    if (name === 'users') renderUsers(allUsers);
    if (name === 'items') loadItems();
  });
});

// ─── Stats ──────────────────────────────────────────────────────────
async function loadAll() {
  document.getElementById('lastUp').textContent = 'جاري التحديث...';
  try { await Promise.all([loadStats(), loadUsers()]); } catch {}
  document.getElementById('lastUp').textContent = 'آخر تحديث: ' + new Date().toLocaleTimeString('ar');
}

async function loadStats() {
  const now = new Date().toISOString();
  const week = new Date(Date.now() - 7*24*60*60*1000).toISOString();
  const today = new Date(); today.setHours(0,0,0,0);

  const [users, totalItems, todayItems] = await Promise.all([
    sb('profiles', '?select=id,created_at,trial_ends_at,paddle_subscription_id'),
    sbCount('items', '?select=id'),
    sbCount('items', '?select=id&created_at=gte.' + today.toISOString())
  ]);

  const total = users.length;
  const trial = users.filter(u => u.trial_ends_at && u.trial_ends_at > now).length;
  const expired = users.filter(u => !u.paddle_subscription_id && (!u.trial_ends_at || u.trial_ends_at <= now)).length;
  const paid = users.filter(u => u.paddle_subscription_id).length;
  const newU = users.filter(u => u.created_at > week).length;

  const stats = [
    { label: 'إجمالي المستخدمين', val: total, color: '#fff' },
    { label: 'في التجربة', val: trial, color: '#93c5fd' },
    { label: 'منتهية التجربة', val: expired, color: '#fca5a5' },
    { label: 'مدفوعون', val: paid, color: '#86efac' },
    { label: 'جدد (7 أيام)', val: newU, color: '#c9a84c' },
    { label: 'إجمالي العناصر', val: totalItems, color: '#d8b4fe' },
    { label: 'عناصر اليوم', val: todayItems, color: '#f9a8d4' },
  ];
  document.getElementById('statsGrid').innerHTML = stats.map(s =>
    '<div class="stat-card" style="padding:16px;border-radius:12px;"><div style="color:#666;font-size:11px;margin-bottom:4px;">' + s.label + '</div>' +
    '<div style="font-size:28px;font-weight:700;color:' + s.color + ';">' + s.val + '</div></div>'
  ).join('');

  const recent = await sb('profiles', '?select=email,created_at&order=created_at.desc&limit=5');
  document.getElementById('recentList').innerHTML = recent.map(u =>
    '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a1a;">' +
    '<span style="color:#ccc;font-size:13px;">' + (u.email || '—') + '</span>' +
    '<span style="color:#555;font-size:12px;">' + new Date(u.created_at).toLocaleDateString('ar') + '</span></div>'
  ).join('');
}

// ─── Users ──────────────────────────────────────────────────────────
async function loadUsers() {
  const data = await sb('profiles', '?select=id,email,created_at,trial_ends_at,paddle_subscription_id&order=created_at.desc');
  allUsers = data;
  renderUsers(data);
}

function renderUsers(users) {
  const now = new Date().toISOString();
  const q = (document.getElementById('srchUser').value || '').toLowerCase();
  const f = document.getElementById('fltStatus').value;
  let list = users.filter(u => (u.email || '').toLowerCase().includes(q));
  if (f === 'trial') list = list.filter(u => u.trial_ends_at && u.trial_ends_at > now);
  else if (f === 'expired') list = list.filter(u => !u.paddle_subscription_id && (!u.trial_ends_at || u.trial_ends_at <= now));
  else if (f === 'paid') list = list.filter(u => u.paddle_subscription_id);

  document.getElementById('usersBody').innerHTML = list.map(u => {
    const isTrial = u.trial_ends_at && u.trial_ends_at > now;
    const isPaid = u.paddle_subscription_id;
    const badge = isPaid ? '<span class="badge-p">مدفوع</span>' : isTrial ? '<span class="badge-t">تجربة</span>' : '<span class="badge-e">منتهية</span>';
    return '<tr style="border-bottom:1px solid #111;">' +
      '<td style="padding:8px 10px;color:#ccc;">' + (u.email || '—') + '</td>' +
      '<td style="padding:8px 10px;">' + badge + '</td>' +
      '<td style="padding:8px 10px;color:#555;font-size:11px;">' + new Date(u.created_at).toLocaleDateString('ar') + '</td>' +
      '<td style="padding:8px 10px;color:#555;font-size:11px;">' + (u.trial_ends_at ? new Date(u.trial_ends_at).toLocaleDateString('ar') : '—') + '</td>' +
      '<td style="padding:8px 10px;">' +
        '<button class="btn-sm" onclick="quickExtend(\'' + u.email + '\')">+7</button> ' +
        '<button class="btn-sm" style="background:#3b0000;color:#fca5a5;" onclick="quickBan(\'' + u.email + '\')">حظر</button>' +
      '</td></tr>';
  }).join('');
}

document.getElementById('srchUser').addEventListener('input', function() { renderUsers(allUsers); });
document.getElementById('fltStatus').addEventListener('change', function() { renderUsers(allUsers); });
document.getElementById('btnExport').addEventListener('click', function() {
  const csv = ['email,created_at,trial_ends_at', ...allUsers.map(u => [u.email, u.created_at, u.trial_ends_at || ''].join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = 'warraq-' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  toast('تم تصدير CSV ✅');
});

// ─── Items ─────────────────────────────────────────────────────────
async function loadItems() {
  const [tasks, ideas, decs, recent] = await Promise.all([
    sbCount('items', '?select=id&type=eq.task'),
    sbCount('items', '?select=id&type=eq.idea'),
    sbCount('items', '?select=id&type=eq.decision'),
    sb('items', '?select=id,type,created_at&order=created_at.desc&limit=20')
  ]);
  document.getElementById('itemStats').innerHTML = [
    { label: 'مهام', val: tasks, color: '#93c5fd' },
    { label: 'أفكار', val: ideas, color: '#fde68a' },
    { label: 'قرارات', val: decs, color: '#86efac' },
  ].map(s => '<div class="stat-card" style="padding:16px;border-radius:12px;text-align:center;">' +
    '<div style="font-size:24px;font-weight:700;color:' + s.color + ';">' + s.val + '</div>' +
    '<div style="color:#666;font-size:12px;margin-top:4px;">' + s.label + '</div></div>').join('');

  const cols = { task: '#93c5fd', idea: '#fde68a', decision: '#86efac' };
  const labs = { task: 'مهمة', idea: 'فكرة', decision: 'قرار' };
  document.getElementById('itemsList').innerHTML = recent.map(i =>
    '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a1a;">' +
    '<span style="color:' + (cols[i.type] || '#aaa') + ';font-size:13px;">' + (labs[i.type] || i.type) + '</span>' +
    '<span style="color:#555;font-size:12px;">' + new Date(i.created_at).toLocaleString('ar') + '</span></div>'
  ).join('');
}

// ─── Notifications ──────────────────────────────────────────────────
document.getElementById('notifTarget').addEventListener('change', function() {
  document.getElementById('notifEmail').style.display = this.value === 'single' ? 'block' : 'none';
});
document.getElementById('btnSendNotif').addEventListener('click', async function() {
  const target = document.getElementById('notifTarget').value;
  const title = document.getElementById('notifTitle').value.trim();
  const body = document.getElementById('notifBody').value.trim();
  if (!title || !body) return toast('أدخل العنوان والنص');
  try {
    let users = [];
    const now = new Date().toISOString();
    if (target === 'single') {
      const email = document.getElementById('notifEmail').value.trim();
      users = await sb('profiles', '?select=id&email=eq.' + encodeURIComponent(email));
    } else if (target === 'trial') {
      users = await sb('profiles', '?select=id&trial_ends_at=gte.' + now);
    } else {
      users = await sb('profiles', '?select=id');
    }
    for (const u of users) {
      await sbPost('notifications', { user_id: u.id, type: 'admin', title, body, read: false });
    }
    toast('تم إرسال الإشعار لـ ' + users.length + ' مستخدم ✅');
  } catch(e) { toast('خطأ: ' + e.message); }
});

// ─── Actions ────────────────────────────────────────────────────────
document.getElementById('btnExtend').addEventListener('click', async function() {
  const email = document.getElementById('extEmail').value.trim();
  const days = parseInt(document.getElementById('extDays').value);
  if (!email) return toast('أدخل الإيميل');
  try {
    const users = await sb('profiles', '?select=id,trial_ends_at&email=eq.' + encodeURIComponent(email));
    if (!users.length) return toast('المستخدم غير موجود ❌');
    const u = users[0];
    const base = u.trial_ends_at && u.trial_ends_at > new Date().toISOString() ? new Date(u.trial_ends_at) : new Date();
    base.setDate(base.getDate() + days);
    await sbPatch('profiles', 'email=eq.' + encodeURIComponent(email), { trial_ends_at: base.toISOString() });
    toast('تم تمديد ' + email + ' +' + days + ' أيام ✅');
    loadAll();
  } catch(e) { toast('خطأ: ' + e.message); }
});

document.getElementById('btnLookup').addEventListener('click', async function() {
  const email = document.getElementById('lookEmail').value.trim();
  const res = document.getElementById('lookResult');
  if (!email) return;
  try {
    const users = await sb('profiles', '?select=*&email=eq.' + encodeURIComponent(email));
    if (!users.length) { res.textContent = 'غير موجود'; res.style.display = 'block'; return; }
    const u = users[0];
    const cnt = await sbCount('items', '?select=id&user_id=eq.' + u.id);
    res.innerHTML = '📧 ' + u.email + '<br>📅 تسجيل: ' + new Date(u.created_at).toLocaleDateString('ar') +
      '<br>⏳ انتهاء التجربة: ' + (u.trial_ends_at ? new Date(u.trial_ends_at).toLocaleDateString('ar') : '—') +
      '<br>📝 عدد العناصر: ' + cnt + '<br>🚫 محظور: ' + (u.banned ? 'نعم' : 'لا');
    res.style.display = 'block';
  } catch(e) { res.textContent = 'خطأ: ' + e.message; res.style.display = 'block'; }
});

document.getElementById('btnBan').addEventListener('click', async function() {
  const email = document.getElementById('banEmail').value.trim();
  const reason = document.getElementById('banReason').value;
  if (!email) return toast('أدخل الإيميل');
  if (!confirm('تعطيل ' + email + '؟')) return;
  try {
    await sbPatch('profiles', 'email=eq.' + encodeURIComponent(email), { banned: true, ban_reason: reason });
    toast('تم تعطيل ' + email + ' 🚫');
    loadAll();
  } catch(e) { toast('خطأ: ' + e.message); }
});

document.getElementById('btnUnban').addEventListener('click', async function() {
  const email = document.getElementById('unbanEmail').value.trim();
  if (!email) return toast('أدخل الإيميل');
  try {
    await sbPatch('profiles', 'email=eq.' + encodeURIComponent(email), { banned: false, ban_reason: null });
    toast('تم تفعيل ' + email + ' ✅');
    loadAll();
  } catch(e) { toast('خطأ: ' + e.message); }
});

function quickExtend(email) {
  document.getElementById('extEmail').value = email;
  document.getElementById('extDays').value = '7';
  document.getElementById('btnExtend').click();
}
function quickBan(email) {
  document.getElementById('banEmail').value = email;
  document.getElementById('btnBan').click();
}

// ─── Toast ──────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3500);
}

// ─── Auto-login ─────────────────────────────────────────────────────
(function() {
  try {
    const u = sessionStorage.getItem('su');
    const k = sessionStorage.getItem('sk');
    if (u && k) {
      SB_URL = u; SB_KEY = k;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dash').style.display = 'block';
      loadAll();
    }
  } catch {}
})();
</script>
